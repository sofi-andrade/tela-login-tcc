<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Arial', sans-serif;
  background: #18181d;
  color: #fff;
  min-height: 100vh;
}

.tela-label {
  font-size: 11px;
  color: #aaa;
  padding: 6px 12px;
  background: #1c1c2e;
}

nav {
  background: #1a1a2a;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  height: 56px;
  gap: 12px;
}


.nav-center {
  display: flex;
  gap: 28px;
  align-items: center;
}

.nav-center a {
  color: #fff;
  text-decoration: none;
  font-size: 14px;
  font-weight: 400;
}

.nav-right {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-shrink: 0;
}

.search-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: transparent;
  border: 1.5px solid #ccc;
  border-radius: 20px;
  padding: 5px 12px;
  color: #ccc;
  font-size: 13px;
  cursor: pointer;
}

.btn-cadastro {
  background: #9333ea;
  color: #fff;
  border: none;
  border-radius: 20px;
  padding: 7px 20px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
}

.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  background: none;
  border: none;
  padding: 4px;
}
.hamburger span { width: 22px; height: 2px; background: #fff; border-radius: 2px; display: block; }

/* HERO */
.hero {
  position: relative;
  width: 100%;
  background-image: url('https://images.unsplash.com/photo-1583608205776-bfd35f0d9f83?w=900&q=80');
  background-size: cover;
  background-position: center 40%;
  height: 340px;
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to right, rgba(10,10,25,0.72) 0%, rgba(10,10,25,0.45) 50%, rgba(10,10,25,0.15) 100%);
}

.hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(10,10,25,0.65) 0%, transparent 60%);
}

.hero-content {
  position: absolute;
  bottom: 32px;
  left: 28px;
  z-index: 2;
  max-width: 480px;
}

.hero-title {
  font-size: 22px;
  font-weight: 400;
  letter-spacing: 0.12em;
  color: #fff;
  text-transform: uppercase;
  margin-bottom: 10px;
  text-shadow: 0 1px 8px rgba(0,0,0,0.6);
}

.hero-subtitle {
  font-size: 14px;
  font-weight: 700;
  line-height: 1.55;
  color: #fff;
  text-shadow: 0 1px 6px rgba(0,0,0,0.7);
}

/* PILLS BAR - ocupa toda a largura */
.pills-bar {
  background: #1a1a2a;
  display: flex;
  padding: 14px 16px;
  gap: 12px;
}

.pill {
  flex: 1;                  /* cada pill ocupa fração igual */
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  background: #1e2d50;
  border: none;
  border-radius: 30px;
  padding: 10px 8px;
  color: #fff;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.18s;
  min-width: 0;
}

.pill:hover { background: #2a3d6a; }

.pill-icon {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.pill-icon.futebol  { background: #1b3a8c; }
.pill-icon.basquete { background: #c0392b; }
.pill-icon.volei    { background: #1565c0; }
.pill-icon.danca    { background: #4a1080; }

/* em telas pequenas o texto some, fica só ícone + label curto */
@media (max-width: 680px) {
  .nav-center { display: none; }
  .search-btn span { display: none; }
  .hamburger { display: flex; }
  nav { padding: 0 16px; }
  .hero { height: 260px; background-position: 65% 40%; }
  .hero-content { left: 16px; bottom: 20px; max-width: 90%; }
  .hero-title { font-size: 17px; }
  .hero-subtitle { font-size: 12px; }
  .pills-bar { padding: 12px 10px; gap: 8px; }
  .pill { font-size: 12px; padding: 9px 4px; gap: 6px; }
  .pill-icon { width: 28px; height: 28px; }
}

@media (max-width: 400px) {
  .pill-label { display: none; }          /* só ícone em telas minúsculas */
  .pill { padding: 9px; justify-content: center; }
}

footer {
    background: #111; border-top: 0.5px solid rgba(255,255,255,0.1);
    padding: 20px 24px;
  }
  .footer-content { display: flex; justify-content: space-between; align-items: center; }
  .footer-title { font-size: 14px; font-weight: 500; color: #fff; margin-bottom: 4px; }
  .footer-sub { font-size: 12px; color: rgba(255,255,255,0.45); }
  .footer-links { display: flex; gap: 6px; }
  .footer-link {
    width: 40px; height: 40px; border-radius: 10px;
    background: rgba(255,255,255,0.06); border: 0.5px solid rgba(255,255,255,0.12);
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.6); text-decoration: none; font-size: 18px;
    transition: all 0.15s;
  }
  .footer-link:hover { background: rgba(168,85,247,0.15); color: #a855f7; border-color: #a855f7; }
  .footer-link:focus-visible { outline: 2px solid #a855f7; outline-offset: 2px; }
</style>
</head>
<body>

<nav>
  <div class="logo"  >
   <img src="" alt="" width="190px" >

  <div class="nav-center">
    <a href="#">Inicio</a>

      <span></span><span></span><span></span>

<section class="hero">

<div class="pills-bar">

  <button class="pill">

      <svg width="20" height="20" viewBox="0 0 24 24" fill="white">

        <polygon points="12,5 14.5,9 12,13 9.5,9" fill="white" opacity="0.9"/>
        <polygon points="12,13 16,14.5 15,18 9,18 8,14.5" fill="white" opacity="0.7"/>
        <polygon points="5.5,9 9.5,9 8,14.5 4,13" fill="white" opacity="0.8"/>
        <polygon points="18.5,9 14.5,9 16,14.5 20,13" fill="white" opacity="0.8"/>

        <path d="M3.5 12h17M12 3.5c-2.5 2.5-3.5 5.5-3.5 8.5s1 6 3.5 8.5M12 3.5c2.5 2.5 3.5 5.5 3.5 8.5s-1 6-3.5 8.5"/>

  <button class="pill">

        <path d="M3.5 9.5c3 1 5.5 3 8.5 3M12 12.5c2-3 5-4.5 8-5M12 3.5c1 3.5.5 7-2 9.5M12 3.5c-2 3-2.5 6.5-1 9.5M6.5 19.5c1.5-3 4-5 6-7.5"/>

  <button class="pill">

</div>

</body>
</html>
